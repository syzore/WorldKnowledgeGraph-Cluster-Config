apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: argocd-server
  namespace: argocd
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`argocd.knodes.app`)
      priority: 10
      services:
        - name: argocd-server
          port: 443
          serversTransport: argocd-skip-tls
  tls:
    certResolver: letsencrypt
