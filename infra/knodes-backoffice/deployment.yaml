apiVersion: apps/v1
kind: Deployment
metadata:
  name: knodes-backoffice
  namespace: knodes-backoffice
spec:
  replicas: 1
  selector:
    matchLabels:
      app: knodes-backoffice
  template:
    metadata:
      labels:
        app: knodes-backoffice
    spec:
      imagePullSecrets:
        - name: registry-pull-secret
      containers:
        - name: backoffice
          image: registry.knodes.app/knodes-backoffice:51772c8473e4d39efab88241965a04cffc841d3c
          imagePullPolicy: Always
          ports:
            - containerPort: 80
