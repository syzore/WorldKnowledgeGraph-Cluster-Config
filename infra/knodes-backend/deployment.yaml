apiVersion: apps/v1
kind: Deployment
metadata:
  name: knodes-backend
  namespace: knodes-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: knodes-backend
  template:
    metadata:
      labels:
        app: knodes-backend
    spec:
      imagePullSecrets:
        - name: registry-pull-secret
      containers:
        - name: backend
          image: registry.knodes.app/knodes-backend:973df71c6314bff42d3d344216fbfc88b737678a
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: backend-secrets
            - secretRef:
                name: backend-anthropic
          env:
            - name: FIREBASE_SERVICE_ACCOUNT_JSON
              value: /etc/firebase/FIREBASE_SERVICE_ACCOUNT_JSON
          volumeMounts:
            - name: firebase-secret
              mountPath: /etc/firebase
              readOnly: true
      volumes:
        - name: firebase-secret
          secret:
            secretName: backend-firebase
