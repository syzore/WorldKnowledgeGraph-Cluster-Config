apiVersion: apps/v1
kind: Deployment
metadata:
  name: registry
  namespace: registry
spec:
  replicas: 1
  selector:
    matchLabels:
      app: registry
  template:
    metadata:
      labels:
        app: registry
    spec:
      containers:
        - name: registry
          image: registry:2.8.3
          command: [sh, -c]
          args:
            - |
              cat > /tmp/config.yml << EOF
              version: 0.1
              storage:
                s3:
                  accesskey: $OCI_ACCESS_KEY
                  secretkey: $OCI_SECRET_KEY
                  region: $OCI_REGION
                  regionendpoint: https://$OCI_NAMESPACE.compat.objectstorage.$OCI_REGION.oraclecloud.com
                  bucket: $OCI_BUCKET
                  secure: true
                  v4auth: true
                  chunksize: 5242880
                  multipartcopythresholdsize: 33554432
              http:
                addr: :5000
                secret: knodes-registry-http-secret-xk9m2p7r
              auth:
                htpasswd:
                  realm: registry.knodes.app
                  path: /auth/htpasswd
              log:
                level: info
              EOF
              exec /bin/registry serve /tmp/config.yml
          ports:
            - containerPort: 5000
          env:
            - name: OCI_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: registry-oci-credentials
                  key: access_key
            - name: OCI_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: registry-oci-credentials
                  key: secret_key
            - name: OCI_REGION
              valueFrom:
                secretKeyRef:
                  name: registry-oci-credentials
                  key: region
            - name: OCI_NAMESPACE
              valueFrom:
                secretKeyRef:
                  name: registry-oci-credentials
                  key: namespace
            - name: OCI_BUCKET
              valueFrom:
                secretKeyRef:
                  name: registry-oci-credentials
                  key: bucket
          volumeMounts:
            - name: auth
              mountPath: /auth
          readinessProbe:
            httpGet:
              path: /
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: auth
          secret:
            secretName: registry-htpasswd
