apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: redirect-to-app
  namespace: kube-system
spec:
  redirectRegex:
    regex: ".*"
    replacement: "https://app.knodes.app"
    permanent: true
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: root-domain
  namespace: kube-system
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`knodes.app`)
      kind: Rule
      middlewares:
        - name: redirect-to-app
      services:
        - name: traefik
          port: 80
  tls:
    certResolver: letsencrypt
