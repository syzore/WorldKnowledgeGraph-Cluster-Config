apiVersion: argoproj.io/v1alpha1
kind: EventSource
metadata:
  name: github-webhooks
  namespace: argo-events
spec:
  service:
    ports:
      - port: 12000
        targetPort: 12000
  webhook:
    backend:
      port: "12000"
      endpoint: /push/backend
      method: POST
    backoffice:
      port: "12000"
      endpoint: /push/backoffice
      method: POST
    app:
      port: "12000"
      endpoint: /push/app
      method: POST
